<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Board</title>
</head>
<body>

    <header>
        <h1>General Discussion Board</h1>
    </header>

    <main>

        <!-- ============================================================
             Section 1: Create a New Topic
             ============================================================ -->
        <section>
            <h2>Start a New Topic</h2>

            <form id="new-topic-form" action="#">
                <fieldset>
                    <legend>New Topic Details</legend>

                    <label for="topic-subject">Subject</label>
                    <input id="topic-subject" type="text" required>

                    <label for="topic-message">Message</label>
                    <textarea id="topic-message" rows="6" required></textarea>

                    <button id="create-topic" type="submit">Create Topic</button>
                </fieldset>
            </form>
        </section>

        <!-- ============================================================
             Section 2: Existing Topics
             ============================================================ -->
        <section>
            <h2>All Topics</h2>

            <div id="topic-list-container">

                <!-- Dummy Topic 1 -->
                <article>
                    <h3>
                        <a href="topic-detail.html">Question about CSS Flexbox</a>
                    </h3>
                    <footer>Posted by: Alice Johnson on 2025-01-13</footer>
                    <div>
                        <button class="edit-btn" data-id="1">Edit</button>
                        <button class="delete-btn" data-id="1">Delete</button>
                    </div>
                </article>

                <!-- Dummy Topic 2 -->
                <article>
                    <h3>
                        <a href="topic-detail.html">How does JavaScript async/await work?</a>
                    </h3>
                    <footer>Posted by: Bob Smith on 2025-01-14</footer>
                    <div>
                        <button class="edit-btn" data-id="2">Edit</button>
                        <button class="delete-btn" data-id="2">Delete</button>
                    </div>
                </article>

                <!-- Dummy Topic 3 -->
                <article>
                    <h3>
                        <a href="topic-detail.html">Best practices for SQL database design</a>
                    </h3>
                    <footer>Posted by: Carol White on 2025-01-15</footer>
                    <div>
                        <button class="edit-btn" data-id="3">Edit</button>
                        <button class="delete-btn" data-id="3">Delete</button>
                    </div>
                </article>

            </div>
        </section>

    </main>

</body>
</html>
