<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Weekly Breakdown</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js" defer></script>
</head>
<body>

    <header>
        <h1>Manage Weekly Breakdown</h1>
    </header>

    <main>

        <section id="form-section">

            <h2>Add a New Week</h2>

            <form id="week-form" action="#">
                <fieldset>
                    <legend>Weekly Details</legend>

                    <label for="week-title">Week Title</label>
                    <input
                        type="text"
                        id="week-title"
                        name="week-title"
                        placeholder="Week 1: Introduction to HTML"
                        required
                    >

                    <label for="week-start-date">Start Date</label>
                    <input
                        type="date"
                        id="week-start-date"
                        name="week-start-date"
                        required
                    >

                    <label for="week-description">Description</label>
                    <textarea
                        id="week-description"
                        name="week-description"
                        rows="5"
                        placeholder="Describe the topics covered this week..."
                    ></textarea>

                    <label for="week-links">Resource Links (one URL per line)</label>
                    <textarea
                        id="week-links"
                        name="week-links"
                        rows="3"
                        placeholder="https://example.com/resource"
                    ></textarea>

                    <button type="submit" id="add-week">Add Week</button>

                </fieldset>
            </form>

        </section>

        <section id="weeks-list-section">

            <h2>Current Weekly Breakdown</h2>

            <table id="weeks-table">
                <thead>
                    <tr>
                        <th scope="col">Week Title</th>
                        <th scope="col">Start Date</th>
                        <th scope="col">Description</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="weeks-tbody">
                </tbody>
            </table>

        </section>

    </main>

</body>
</html>
